<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2c3e50">
  <meta name="description" content="Daily Devotional App">
  
  <!-- Web App Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Daily Devotional">
  
  <!-- Icons -->
  <link rel="manifest" href="./onethingwebapp/manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
  
  <title>Daily Devotional</title>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>Daily Devotional</h1>
      <div class="date-navigation">
        <button id="prevBtn" onclick="previousDay()">&larr; Yesterday</button>
        <span id="dateDisplay"></span>
        <button id="nextBtn" onclick="nextDay()">Tomorrow &rarr;</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="content">
      <!-- Loading State -->
      <div id="loading" class="loading">
        <p>Loading devotional...</p>
      </div>

      <!-- Error State -->
      <div id="error" class="error" style="display: none;">
        <p id="errorMessage"></p>
      </div>

      <!-- Devotional Content -->
      <article id="devotionalContent" style="display: none;">
        <!-- Title -->
        <h2 id="title"></h2>

        <!-- Bible Passage -->
        <section class="passage-section">
          <h3>Scripture Reading</h3>
          <div class="passage">
            <p class="passage-ref" id="passageRef"></p>
            <p class="passage-text" id="passageText"></p>
          </div>
        </section>

        <!-- Article -->
        <section class="article-section">
          <h3>Reflection</h3>
          <div id="article" class="article"></div>
        </section>

        <!-- Questions -->
        <section class="questions-section">
          <h3>Reflection Questions</h3>
          <form id="questionsForm">
            <div id="questionsContainer"></div>
          </form>
        </section>

        <!-- Save Button -->
        <div class="button-group">
          <button type="button" onclick="saveResponses()" class="btn btn-primary">
            Save Responses
          </button>
          <button type="button" onclick="clearResponses()" class="btn btn-secondary">
            Clear Answers
          </button>
        </div>

        <!-- Status Message -->
        <div id="statusMessage" class="status-message" style="display: none;"></div>
      </article>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2024 Daily Devotional App</p>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
